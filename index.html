<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fast Tow Service</title>

<style>
body {
    font-family: Arial;
    background: #111;
    color: white;
    text-align: center;
}

header {
    background: #ffcc00;
    color: black;
    padding: 20px;
    font-size: 28px;
}

.container {
    margin-top: 40px;
}

form {
    background: #222;
    padding: 20px;
    width: 300px;
    margin: auto;
    border-radius: 10px;
}

input, textarea {
    width: 90%;
    padding: 10px;
    margin: 10px;
    border: none;
    border-radius: 5px;
}

button {
    background: #ffcc00;
    border: none;
    padding: 12px;
    width: 95%;
    font-size: 16px;
    cursor: pointer;
}

button:hover {
    background: orange;
}
</style>
</head>

<body>

<header>
🚚 Fast Tow Service - 24/7 Towing
</header>

<div class="container">
<h2>Need a Tow? Enter Your Info</h2>

<form action="https://formsubmit.co/YOUR_EMAIL_HERE" method="POST">

<input type="text" name="name" placeholder="Your Name" required>

<input type="tel" name="phone" placeholder="Phone Number" required>

<input type="text" name="location" placeholder="Your Location" required>

<textarea name="issue" placeholder="What happened to your car?" required></textarea>

<button type="submit">Request Tow</button>

</form>
</div>

</body>
</html>
